name: shams_printing
description: مطبعة شمس للدعاية والإعلان - نظام إدارة الفواتير والحسابات
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite_common_ffi: ^2.3.2+1
  path: ^1.9.0
  path_provider: ^2.1.2

  # State Management
  provider: ^6.1.2

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.12.0

  # QR Code
  qr_flutter: ^4.1.0
  qr: ^3.0.1

  # File operations
  file_picker: ^8.0.0+1

  # URL Launcher (WhatsApp / Share)
  url_launcher: ^6.2.5
  share_plus: ^9.0.0

  # Formatting
  intl: ^0.20.2

  # Window Manager (Windows desktop)
  window_manager: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
